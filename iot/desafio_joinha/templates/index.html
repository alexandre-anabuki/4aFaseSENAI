<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle</title>
    <style>
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; text-align: center; background: #101820; color: white; }
        .header { display: flex; justify-content: space-between; padding: 20px 40px; background: #1f2937; align-items: center; }
        .header a { color: #ef4444; text-decoration: none; font-weight: bold; }
        .content { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Simulação da Máquina */
        #maquina-simulada {
            width: 640px; max-width: 92vw; height: 100px; margin-bottom: 20px;
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold; transition: background 0.3s;
            background-color: #ef4444; /* Inicia vermelha (desligada) */
            border: 4px solid #fff;
        }

        img { width: 640px; max-width: 92vw; border: 4px solid #38bdf8; border-radius: 12px; background: #000; }
        
        .container-registros {
            margin-top: 20px; width: 640px; max-width: 92vw; background: #1f2937;
            border-radius: 12px; padding: 20px; box-sizing: border-box; text-align: left;
        }
        .container-registros h2 { margin-top: 0; font-size: 20px; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        
        #lista-registros { list-style-type: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        #lista-registros li {
            background: #374151; margin-bottom: 8px; padding: 10px 15px;
            border-radius: 6px; font-size: 14px; border-left: 5px solid #38bdf8;
        }

        /* Popup de notificação do print */
        #popup-print {
            display: none; position: fixed; bottom: 20px; right: 20px;
            background: #38bdf8; color: white; padding: 15px 25px;
            border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="popup-print">Print salvo!</div>

    <div class="header">
        <div>Operador logado: <strong>{{ usuario }}</strong></div>
        <a href="/logout">Sair</a>
    </div>

    <div class="content">
        <h1>Controle por Gestos</h1>
        
        <div id="maquina-simulada">MÁQUINA DESLIGADA</div>

        <p>👍 Joinha = <strong>Ligar</strong> | 🤙 Hang Loose = <strong>Desligar</strong></p>
        <img src="/video_feed" alt="Imagem da webcam">

        <div class="container-registros">
            <h2>Histórico de Operações</h2>
            <ul id="lista-registros"></ul>
        </div>
    </div>

    <script>
        // Começa desligada para alinhar com o backend
        let estadoAnterior = "Desligada"; 

        async function verificarGesto() {
            try {
                const resposta = await fetch('/gesture_status');
                const dados = await resposta.json();
                
                const gesto = dados.gesto;
                const estadoAtual = dados.estado_maquina;
                const usuario = dados.usuario;

                // Atualiza a máquina visualmente
                const maquinaDiv = document.getElementById('maquina-simulada');
                if (estadoAtual === "Ligada") {
                    maquinaDiv.style.backgroundColor = "#22c55e"; // Verde
                    maquinaDiv.textContent = "MÁQUINA LIGADA";
                } else {
                    maquinaDiv.style.backgroundColor = "#ef4444"; // Vermelho
                    maquinaDiv.textContent = "MÁQUINA DESLIGADA";
                }

                // Registra no histórico se o estado MUDAR
                if (estadoAtual !== estadoAnterior) {
                    registrarNoHistorico(usuario, gesto, estadoAtual);
                    estadoAnterior = estadoAtual;
                    mostrarPopupPrint();
                }
            } catch (error) {
                console.error("Erro ao verificar status:", error);
            }
        }

        function registrarNoHistorico(usuario, gesto, estado) {
            const lista = document.getElementById('lista-registros');
            const horario = new Date().toLocaleTimeString('pt-BR');
            const data = new Date().toLocaleDateString('pt-BR');
            
            const item = document.createElement('li');
            item.innerHTML = `<strong>[${data} ${horario}]</strong> O usuário <strong>${usuario}</strong> usou o gesto <em>${gesto}</em> -> Máquina foi <strong>${estado}</strong>. (Print salvo)`;
            
            // Adiciona no topo da lista
            lista.prepend(item);
        }

        function mostrarPopupPrint() {
            const popup = document.getElementById('popup-print');
            popup.style.display = 'block';
            setTimeout(() => {
                popup.style.display = 'none';
            }, 2500);
        }

        // Verifica a cada 500ms
        setInterval(verificarGesto, 500);
    </script>
</body>
</html>
