<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Máquina</title>
    <style>
        body {
            margin: 0; min-height: 100vh; font-family: Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            background: #101820; color: white;
        }
        .login-box {
            background: #1f2937; padding: 40px; border-radius: 12px;
            text-align: center; width: 300px;
        }
        input {
            width: 100%; padding: 10px; margin: 15px 0;
            border-radius: 6px; border: none; box-sizing: border-box;
        }
        button {
            background: #38bdf8; color: white; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer;
            font-size: 16px; width: 100%; font-weight: bold;
        }
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        <form method="POST" action="/login">
            <input type="text" name="nome" placeholder="Digite seu nome" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
